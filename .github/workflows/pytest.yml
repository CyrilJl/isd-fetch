name: Run Pytest

on:
  workflow_dispatch: # Manual trigger
  pull_request: # Run on every pull request
  schedule: # Weekly scheduled run
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pandas-version:
          - ">=2,<3"
          - ">=3,<4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas${{ matrix.pandas-version }}" pytest geopandas geopy tqdm

      - name: Install package
        run: |
          pip install . --no-deps

      - name: Run Pytest
        run: |
          pytest tests/test_isd_lite.py
